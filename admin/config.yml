backend:
  name: github
  repo: homesitezip/work
  branch: main

site_url: https://homesitezip.github.io/work/
display_url: https://homesitezip.github.io/work/

media_folder: "assets/images/portfolio"
public_folder: "/work/assets/images/portfolio"

collections:
  - name: "portfolio"
    label: "포트폴리오"
    folder: "_portfolio"
    create: true
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "대표 이미지", name: "featured_image", widget: "image" }
      - { label: "설명", name: "body", widget: "markdown" }
