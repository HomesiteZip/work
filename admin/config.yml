backend:
  name: github
  repo: homesitezip/work
  branch: main # 혹은 master

media_folder: "assets/images/portfolio" # 이미지가 업로드될 경로
public_folder: "/assets/images/portfolio"

collections:
  - name: "portfolio"
    label: "포트폴리오"
    folder: "_portfolio" # 작품 설명(글)이 저장될 폴더
    create: true
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "대표 이미지", name: "featured_image", widget: "image" }
      - { label: "설명", name: "body", widget: "markdown" }
