backend:
  name: github
  repo: HomesiteZip/work
  branch: main

media_folder: "assets/images/portfolio" # 깃허브 저장소 내 실제 폴더 위치
public_folder: "/work/assets/images/portfolio" # 웹상에서 보여질 주소 (work 추가)

collections:
  - name: "portfolio"
    label: "포트폴리오"
    folder: "_portfolio"
    create: true
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "대표 이미지", name: "featured_image", widget: "image" }
      - { label: "설명", name: "body", widget: "markdown" }

backend:
  name: github
  repo: homesitezip/work
  branch: main

# 사이트의 실제 주소
site_url: https://homesitezip.github.io/work/
display_url: https://homesitezip.github.io/work/
