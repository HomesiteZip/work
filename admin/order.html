<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포트폴리오 순서 관리</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }

    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header-right { display: flex; gap: 10px; align-items: center; }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-save { background: #222; color: #fff; }
    .btn-save:hover { background: #444; }
    .btn-save:disabled { background: #aaa; cursor: not-allowed; }
    .btn-back { background: #eee; color: #222; text-decoration: none; display:inline-flex; align-items:center; }
    .btn-back:hover { background: #ddd; }

    .container { max-width: 640px; margin: 32px auto; padding: 0 16px; }

    .notice {
      background: #e8f4fd;
      border: 1px solid #b3d9f5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #1a6fa8;
      margin-bottom: 20px;
    }

    #loginWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
    }
    #loginWrap p { color: #666; font-size: 14px; }
    .btn-login { background: #222; color: #fff; padding: 12px 32px; font-size: 15px; }

    #mainWrap { display: none; }

    .list-wrap {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      background: #fff;
      cursor: grab;
      transition: background 0.15s;
      user-select: none;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }
    .list-item.dragging { opacity: 0.4; }
    .list-item.drag-over { background: #eef6ff; border-top: 2px solid #3b82f6; }

    .drag-handle {
      color: #bbb;
      font-size: 18px;
      cursor: grab;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .drag-handle span {
      display: block;
      width: 18px;
      height: 2px;
      background: #ccc;
      border-radius: 2px;
    }

    .thumb {
      width: 52px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      background: #eee;
      flex-shrink: 0;
    }
    .thumb-placeholder {
      width: 52px;
      height: 40px;
      background: #eee;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: #999; margin-top: 2px; }

    .order-num {
      font-size: 12px;
      color: #bbb;
      font-weight: 600;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .move-btns {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .move-btn {
      width: 26px;
      height: 22px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: #fafafa;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      padding: 0;
    }
    .move-btn:hover { background: #eee; }
    .move-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 48px 16px;
      color: #999;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <h1>포트폴리오 순서 관리</h1>
  <div class="header-right">
    <a href="/work/admin/" class="btn btn-back">← CMS로 돌아가기</a>
    <button class="btn btn-save" id="saveBtn" onclick="saveOrder()" disabled>저장</button>
  </div>
</div>

<div class="container">
  <div id="loginWrap">
    <p>순서를 관리하려면 로그인이 필요합니다.</p>
    <button class="btn btn-login" onclick="window.netlifyIdentity.open()">로그인</button>
  </div>

  <div id="mainWrap">
    <div class="notice">
      💡 항목을 드래그하거나 ▲▼ 버튼으로 순서를 바꾼 뒤 <strong>저장</strong>을 눌러주세요.
    </div>
    <div class="list-wrap" id="listWrap">
      <div class="status" id="statusMsg">게시물을 불러오는 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const NETLIFY_URL   = 'https://stwork.netlify.app';
  const GIT_API       = NETLIFY_URL + '/.netlify/git/github';
  const GITHUB_OWNER  = 'HomesiteZip';
  const GITHUB_REPO   = 'work';
  const PORTFOLIO_PATH = '_portfolio';
  const ORDER_FILE    = '_data/portfolio-order.json';
  const IMAGE_BASE    = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/`;

  let currentUser = null;
  let items = [];        // { slug, title, category, date, thumbnail }
  let savedOrder = [];   // slug 배열
  let dragSrc = null;

  // ── Netlify Identity ──
  window.netlifyIdentity.init({
    APIUrl: NETLIFY_URL + '/.netlify/identity'
  });

  window.netlifyIdentity.on('init', user => {
    if (user) onLogin(user);
  });

  window.netlifyIdentity.on('login', user => {
    window.netlifyIdentity.close();
    onLogin(user);
  });

  window.netlifyIdentity.on('logout', () => {
    currentUser = null;
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('mainWrap').style.display  = 'none';
  });

  function onLogin(user) {
    currentUser = user;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainWrap').style.display  = 'block';
    loadData();
  }

  function getToken() {
    return currentUser && currentUser.token && currentUser.token.access_token;
  }

  // ── 데이터 로드 ──
  async function loadData() {
    try {
      // 1. _portfolio 목록
      const token = getToken();
      const headers = { Authorization: 'Bearer ' + token };

      const listRes = await fetch(`${GIT_API}/contents/${PORTFOLIO_PATH}`, { headers });
      const files   = await listRes.json();
      const mdFiles = files.filter(f => f.name.endsWith('.md'));

      // 각 파일 파싱
      const parsed = await Promise.all(mdFiles.map(async f => {
        const r   = await fetch(f.download_url);
        const raw = await r.text();
        const fm  = parseFrontmatter(raw);
        let thumb = fm.thumbnail || fm.image || '';
        if (thumb && !thumb.startsWith('http')) thumb = IMAGE_BASE + thumb.replace(/^\//, '');
        return {
          slug:      f.name.replace('.md', ''),
          title:     fm.title || f.name,
          category:  fm.category || '',
          date:      fm.date || '',
          thumbnail: thumb
        };
      }));

      // 2. 기존 순서 파일
      try {
        const orderRes = await fetch(`${GIT_API}/contents/${ORDER_FILE}`, { headers });
        if (orderRes.ok) {
          const orderData = await orderRes.json();
          savedOrder = JSON.parse(atob(orderData.content.replace(/\n/g, '')));
        }
      } catch(_) { savedOrder = []; }

      // 저장된 순서 적용 (없는 항목은 뒤에 추가)
      const orderedSlugs = [
        ...savedOrder.filter(s => parsed.find(p => p.slug === s)),
        ...parsed.filter(p => !savedOrder.includes(p.slug)).map(p => p.slug)
      ];
      items = orderedSlugs.map(s => parsed.find(p => p.slug === s)).filter(Boolean);

      renderList();
      document.getElementById('saveBtn').disabled = false;

    } catch(e) {
      console.error(e);
      document.getElementById('statusMsg').textContent = '불러오기 실패. 로그인 상태를 확인해주세요.';
    }
  }

  // ── 렌더링 ──
  function renderList() {
    const wrap = document.getElementById('listWrap');
    if (!items.length) {
      wrap.innerHTML = '<div class="status">게시물이 없습니다.</div>';
      return;
    }
    wrap.innerHTML = items.map((item, i) => `
      <div class="list-item" draggable="true" data-idx="${i}"
           ondragstart="onDragStart(event)"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)"
           ondragend="onDragEnd(event)">
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <span class="order-num">${i + 1}</span>
        ${item.thumbnail
          ? `<img class="thumb" src="${item.thumbnail}" onerror="this.style.display='none'">`
          : `<div class="thumb-placeholder"></div>`}
        <div class="item-info">
          <div class="item-title">${item.title}</div>
          <div class="item-meta">${item.category}${item.date ? ' · ' + item.date : ''}</div>
        </div>
        <div class="move-btns">
          <button class="move-btn" onclick="moveItem(${i}, -1)" ${i === 0 ? 'disabled' : ''}>▲</button>
          <button class="move-btn" onclick="moveItem(${i},  1)" ${i === items.length - 1 ? 'disabled' : ''}>▼</button>
        </div>
      </div>
    `).join('');
  }

  // ── ▲▼ 버튼 이동 ──
  function moveItem(idx, dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= items.length) return;
    [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
    renderList();
  }

  // ── 드래그 앤 드롭 ──
  function getIdx(el) { return parseInt(el.closest('.list-item').dataset.idx); }

  function onDragStart(e) {
    dragSrc = e.currentTarget;
    dragSrc.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.currentTarget;
    if (target !== dragSrc) target.classList.add('drag-over');
  }
  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e) {
    e.preventDefault();
    const target = e.currentTarget;
    target.classList.remove('drag-over');
    if (target === dragSrc) return;
    const from = getIdx(dragSrc);
    const to   = getIdx(target);
    const [moved] = items.splice(from, 1);
    items.splice(to, 0, moved);
    renderList();
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('drag-over'));
  }

  // ── 저장 ──
  async function saveOrder() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      const token   = getToken();
      const headers = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' };
      const slugs   = items.map(i => i.slug);
      const content = btoa(JSON.stringify(slugs, null, 2));

      // 기존 파일 sha 확인
      let sha;
      try {
        const existing = await fetch(`${GIT_API}/contents/${ORDER_FILE}`, { headers });
        if (existing.ok) {
          const data = await existing.json();
          sha = data.sha;
        }
      } catch(_) {}

      const body = { message: 'update portfolio order', content, branch: 'main' };
      if (sha) body.sha = sha;

      const res = await fetch(`${GIT_API}/contents/${ORDER_FILE}`, {
        method: 'PUT',
        headers,
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error(await res.text());
      showToast('✓ 순서가 저장되었습니다');
    } catch(e) {
      console.error(e);
      showToast('저장 실패. 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '저장';
    }
  }

  // ── frontmatter 파싱 ──
  function parseFrontmatter(raw) {
    const match = raw.match(/^---\n([\s\S]*?)\n---/);
    if (!match) return {};
    const fm = {};
    match[1].split('\n').forEach(line => {
      const idx = line.indexOf(':');
      if (idx === -1) return;
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
      if (!fm[key]) fm[key] = val;
    });
    return fm;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
