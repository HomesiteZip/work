<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Portfolio CMS</title>
<!-- index.html과 동일한 style.css를 공유합니다 -->
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
</head>
<body class="admin-body">

<!-- 로그인 화면 -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>관리자 로그인</h1>
    <div class="form-group">
      <label for="adminPw">비밀번호</label>
      <input type="password" id="adminPw" placeholder="비밀번호 입력"
             onkeydown="if(event.key==='Enter') login()">
    </div>
    <button onclick="login()" class="submit-btn" style="width:100%;margin-top:8px;">로그인</button>
    <p id="loginError" class="error-msg" style="display:none;">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div id="adminPanel" style="display:none;">
  <header class="admin-header">
    <span class="logo">CMS 관리자</span>
    <div style="display:flex;gap:12px;align-items:center;">
      <a href="index.html" target="_blank" class="preview-link">사이트 미리보기 →</a>
      <button onclick="logout()" class="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="admin-layout">
    <!-- 프로젝트 목록 -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h2>프로젝트</h2>
        <button onclick="newProject()" class="add-btn">+ 추가</button>
      </div>
      <ul id="projectList" class="project-list"></ul>
    </aside>

    <!-- 편집 영역 -->
    <div class="admin-editor" id="editorArea">
      <div class="editor-empty">
        <p>왼쪽에서 프로젝트를 선택하거나<br>새 프로젝트를 추가하세요.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ───────────────────────────────────────────────
// 관리자 비밀번호 설정
// ───────────────────────────────────────────────
const ADMIN_PASSWORD = '1103';

let projects = [];
let editingId = null;

function login() {
  const pw = document.getElementById('adminPw').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadProjects();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadProjects();
}

function loadProjects() {
  const saved = localStorage.getItem('portfolio_projects');
  if (saved) {
    projects = JSON.parse(saved);
  } else {
    // 최초 접속 시 보여줄 기본 목업 데이터 연동
    projects = [
      { id:1, title:"브랜드 아이덴티티 프로젝트", category: ["GRAPHIC", "EDITORIAL"], thumbnail:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80", date:"2024", year:"2024",
        content:[ {type:"text",value:"클라이언트의 브랜드 정체성을 재정립하는 프로젝트였습니다."}, {type:"image",value:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=80",caption:"메인 로고 디자인"} ] },
      { id:2, title:"모바일 앱 UI/UX 디자인", category: ["WEB DESIGN"], thumbnail:"https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=600&q=80", date:"2024", year:"2024",
        content:[ {type:"text",value:"헬스케어 스타트업의 모바일 앱 전체 UI/UX를 담당했습니다."} ] }
    ];
    saveProjects();
  }
  renderList();
}

function saveProjects() {
  localStorage.setItem('portfolio_projects', JSON.stringify(projects));
}

function renderList() {
  const list = document.getElementById('projectList');
  list.innerHTML = projects.map(p => {
    const catStr = Array.isArray(p.category) ? p.category.join(', ') : p.category;
    return `
    <li class="project-item ${editingId === p.id ? 'active' : ''}" onclick="editProject(${p.id})">
      <div class="project-item-thumb">
        <img src="${p.thumbnail}" alt="" onerror="this.style.display='none'">
      </div>
      <div class="project-item-info">
        <strong>${p.title}</strong>
        <span>${catStr} · ${p.date}</span>
      </div>
    </li>
  `}).join('');
}

function newProject() {
  const id = Date.now();
  const yearStr = new Date().getFullYear().toString();
  const p = {
    id,
    title: '새 프로젝트',
    category: ['GRAPHIC'],
    thumbnail: '',
    date: yearStr,
    year: yearStr,
    content: []
  };
  projects.unshift(p);
  saveProjects();
  renderList();
  editProject(id);
}

function editProject(id) {
  editingId = id;
  renderList();
  const p = projects.find(x => x.id === id);
  if (!p) return;

  const mainCat = Array.isArray(p.category) ? p.category[0] : p.category;

  document.getElementById('editorArea').innerHTML = `
    <div class="editor-form">
      <div class="editor-topbar">
        <h2>프로젝트 편집</h2>
        <div style="display:flex;gap:8px;">
          <button onclick="saveProject()" class="save-btn">저장</button>
          <button onclick="deleteProject(${id})" class="delete-btn">삭제</button>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="eTitle" value="${p.title}">
        </div>
        <div class="form-group">
          <label>카테고리</label>
          <select id="eCategory">
            ${['GRAPHIC','GOODS','EDITORIAL','WEB DESIGN','SPACE','ILLUSTRATION','ORIGINAL']
              .map(c => `<option ${mainCat===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label>연도</label>
          <input type="text" id="eDate" value="${p.date}">
        </div>
        <div class="form-group">
          <label>썸네일 이미지 첨부</label>
          <input type="file" accept="image/*" onchange="handleThumbnailUpload(event)" style="padding: 8px 12px; cursor: pointer;">
          <input type="hidden" id="eThumbnail" value="${p.thumbnail}">
          <img id="thumbnailPreview" src="${p.thumbnail}" style="max-width: 100%; max-height: 140px; margin-top: 10px; border-radius: var(--radius); object-fit: cover; display: ${p.thumbnail ? 'block' : 'none'};">
        </div>
      </div>

      <div class="content-editor">
        <div class="content-editor-header">
          <label>상세 콘텐츠 블록</label>
          <div style="display:flex;gap:8px;">
            <button onclick="addBlock('text')" class="add-block-btn">+ 텍스트</button>
            <button onclick="addBlock('image')" class="add-block-btn">+ 이미지</button>
          </div>
        </div>
        <div id="blocksContainer">
          ${p.content.map((b,i) => renderBlock(b,i)).join('')}
        </div>
      </div>
    </div>
  `;
}

function handleThumbnailUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Image = e.target.result;
    document.getElementById('eThumbnail').value = base64Image;
    const preview = document.getElementById('thumbnailPreview');
    preview.src = base64Image;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function handleBlockImageUpload(event, idx) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Image = e.target.result;
    // 숨겨진 input 업데이트
    const input = document.getElementById(`block_${idx}`);
    if (input) input.value = base64Image;
    
    // 미리보기 이미지 업데이트
    const preview = document.getElementById(`block_preview_${idx}`);
    if (preview) {
      preview.src = base64Image;
      preview.style.display = 'block';
    }
    
    // 데이터 반영
    updateBlock(idx, 'image_url', base64Image);
  };
  reader.readAsDataURL(file);
}

function renderBlock(block, idx) {
  if (block.type === 'text') return `
    <div class="block-item" data-idx="${idx}" data-type="text">
      <div class="block-handle">
        <span class="block-label">텍스트</span>
        <button onclick="removeBlock(${idx})" class="remove-block">✕</button>
      </div>
      <textarea rows="4" id="block_${idx}" oninput="updateBlock(${idx},'text',this.value)">${block.value}</textarea>
    </div>`;
  if (block.type === 'image') return `
    <div class="block-item" data-idx="${idx}" data-type="image">
      <div class="block-handle">
        <span class="block-label">이미지 첨부</span>
        <button onclick="removeBlock(${idx})" class="remove-block">✕</button>
      </div>
      <input type="file" accept="image/*" onchange="handleBlockImageUpload(event, ${idx})" style="padding: 8px 12px; cursor: pointer; width: 100%;">
      <input type="hidden" id="block_${idx}" value="${block.value}">
      <img id="block_preview_${idx}" src="${block.value}" class="block-preview" style="display: ${block.value ? 'block' : 'none'};">
    </div>`;
  return '';
}

function addBlock(type) {
  const p = projects.find(x => x.id === editingId);
  if (!p) return;
  if (type === 'text') p.content.push({ type: 'text', value: '' });
  if (type === 'image') p.content.push({ type: 'image', value: '' }); // 캡션 삭제
  saveProjects();
  editProject(editingId);
}

function removeBlock(idx) {
  const p = projects.find(x => x.id === editingId);
  if (!p) return;
  p.content.splice(idx, 1);
  saveProjects();
  editProject(editingId);
}

function updateBlock(idx, field, value) {
  const p = projects.find(x => x.id === editingId);
  if (!p || !p.content[idx]) return;
  if (field === 'text') p.content[idx].value = value;
  if (field === 'image_url') p.content[idx].value = value;
}

function saveProject() {
  const p = projects.find(x => x.id === editingId);
  if (!p) return;
  p.title     = document.getElementById('eTitle').value;
  p.category  = [document.getElementById('eCategory').value]; // 배열 형태로 저장 (index.html 연동)
  p.date      = document.getElementById('eDate').value;
  p.year      = p.date.substring(0, 4); // 연도 데이터 자동 추출 저장
  p.thumbnail = document.getElementById('eThumbnail').value;
  saveProjects();
  renderList();

  const btn = document.querySelector('.save-btn');
  btn.textContent = '저장됨 ✓';
  btn.style.background = '#22c55e';
  btn.style.color = '#fff';
  setTimeout(() => { btn.textContent = '저장'; btn.style.background = ''; btn.style.color = ''; }, 1500);
}

function deleteProject(id) {
  if (!confirm('이 프로젝트를 삭제할까요?')) return;
  projects = projects.filter(p => p.id !== id);
  saveProjects();
  editingId = null;
  renderList();
  document.getElementById('editorArea').innerHTML = `<div class="editor-empty"><p>프로젝트를 선택하거나 추가하세요.</p></div>`;
}
</script>
</body>
</html>
