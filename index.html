<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Zip Portfolio</title>
<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<!-- ================= INDEX VIEW ================= -->
<div id="view-index" class="view-container active">
  <header id="siteHeader">
    <nav>
      <a href="#" onclick="switchView('index'); return false;" class="logo">STUDIO ZIP</a>
      <div class="nav-links">
        <a href="#" onclick="switchView('contact'); return false;">CONTACT</a>
      </div>
    </nav>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-inner">
      <div class="filter-group category-group">
        <label style="font-weight: 700; color: var(--text); cursor: pointer;" onclick="setCategory('', null)">CATEGORY</label>
        <div class="category-list">
          <button class="cat-filter-btn" data-cat="GRAPHIC" onclick="setCategory('GRAPHIC', this)">GRAPHIC</button>
          <button class="cat-filter-btn" data-cat="GOODS" onclick="setCategory('GOODS', this)">GOODS</button>
          <button class="cat-filter-btn" data-cat="EDITORIAL" onclick="setCategory('EDITORIAL', this)">EDITORIAL</button>
          <button class="cat-filter-btn" data-cat="WEB DESIGN" onclick="setCategory('WEB DESIGN', this)">WEB DESIGN</button>
          <button class="cat-filter-btn" data-cat="SPACE" onclick="setCategory('SPACE', this)">SPACE</button>
          <button class="cat-filter-btn" data-cat="ILLUSTRATION" onclick="setCategory('ILLUSTRATION', this)">ILLUSTRATION</button>
          <button class="cat-filter-btn" data-cat="ORIGINAL" onclick="setCategory('ORIGINAL', this)">ORIGINAL</button>
        </div>
      </div>

      <div class="filter-right">
        <div class="filter-group">
          <label>YEAR</label>
          <select id="filterYear" onchange="applyFilters()">
            <option value="">All</option>
            <option value="before2017">Before 2017</option>
            <option value="2017">2017</option>
            <option value="2018">2018</option>
            <option value="2019">2019</option>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
        <button class="filter-reset" onclick="resetFilters()">
          RESET
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <main id="galleryMain">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="no-results" id="noResults" style="display:none;">
      <p>해당하는 작업물이 없습니다.</p>
    </div>
  </main>
</div>

<!-- ================= DETAIL VIEW ================= -->
<div id="view-detail" class="view-container">
  <header id="siteHeaderDetail">
    <nav>
      <a href="#" onclick="switchView('index'); return false;" class="logo">STUDIO ZIP</a>
      <div class="nav-links">
        <a href="#" onclick="switchView('contact'); return false;">CONTACT</a>
      </div>
    </nav>
  </header>

  <main class="detail-page" id="detailPage">
    <div class="detail-content" id="detailContent"></div>
  </main>
</div>

<!-- ================= CONTACT VIEW ================= -->
<div id="view-contact" class="view-container">
  <header id="siteHeaderContact">
    <nav>
      <a href="#" onclick="switchView('index'); return false;" class="logo">STUDIO ZIP</a>
      <div class="nav-links">
        <a href="#" onclick="switchView('contact'); return false;" class="active">CONTACT</a>
      </div>
    </nav>
  </header>

  <main class="contact-main">
    <div class="contact-wrapper">
      <section class="about-section">
        <h1>안녕하세요,<br>저는 <em>홍길동</em>입니다.</h1>
        <p class="about-desc">
          브랜딩, UI/UX, 패키지 디자인을 중심으로 활동하는 디자이너입니다.<br>
          클라이언트의 비전을 시각적 언어로 번역하는 일에 열정을 가지고 있습니다.<br>
          작업 의뢰나 협업 제안은 아래 폼을 통해 편하게 연락 주세요.
        </p>
        <div class="about-links">
          <a href="mailto:hello@email.com">hello@email.com</a>
          <div class="about-social">
            <a href="https://instagram.com/" target="_blank" class="social-icon-link" aria-label="Instagram">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
              </svg>
            </a>
            <a href="https://x.com/" target="_blank" class="social-icon-link" aria-label="X">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
            </a>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>작업 의뢰</h2>
        <div id="formWrap">
          <div class="form-row two-col">
            <div class="form-group">
              <label for="name">담당자 이름 <span class="required">*</span></label>
              <input type="text" id="name" placeholder="홍길동" oninput="checkForm()">
            </div>
            <div class="form-group">
              <label for="phone">연락처 <span class="required">*</span></label>
              <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13" inputmode="numeric" oninput="formatPhone(this)">
            </div>
          </div>

          <div class="form-group">
            <label for="email">이메일 <span class="required">*</span></label>
            <input type="email" id="email" placeholder="hello@email.com" oninput="checkForm()" onblur="validateEmail()">
            <span class="field-error" id="emailError">올바른 이메일 주소를 입력해 주세요.</span>
          </div>

          <div class="form-group">
            <label>의뢰 분야 <span class="required">*</span> <span class="label-sub">(복수 선택 가능)</span></label>
            <div class="checkbox-grid" id="catGrid">
              <label class="check-item"><input type="checkbox" value="GRAPHIC" onchange="checkForm()"><span>GRAPHIC</span></label>
              <label class="check-item"><input type="checkbox" value="GOODS" onchange="checkForm()"><span>GOODS</span></label>
              <label class="check-item"><input type="checkbox" value="EDITORIAL" onchange="checkForm()"><span>EDITORIAL</span></label>
              <label class="check-item"><input type="checkbox" value="ILLUSTRATION" onchange="checkForm()"><span>ILLUSTRATION</span></label>
            </div>
          </div>

          <div class="form-group">
            <label>상세 분야 <span class="required">*</span></label>
            <div class="checkbox-grid" style="grid-template-columns: 1fr 1fr;">
              <label class="check-item"><input type="radio" name="detail_category" value="디자인 의뢰만" onchange="checkForm()"><span>디자인 의뢰만</span></label>
              <label class="check-item"><input type="radio" name="detail_category" value="제품 제작 및 납품 포함" onchange="checkForm()"><span>제품 제작 및 납품 포함</span></label>
            </div>
          </div>

          <div class="form-group">
            <label>프로젝트 예산범위 <span class="required">*</span></label>
            <div class="checkbox-grid">
              <label class="check-item"><input type="radio" name="budget" value="300만원 이하" onchange="checkForm()"><span>300만원 이하</span></label>
              <label class="check-item"><input type="radio" name="budget" value="300만원 이상" onchange="checkForm()"><span>300만원 이상</span></label>
              <label class="check-item"><input type="radio" name="budget" value="500만원 이상" onchange="checkForm()"><span>500만원 이상</span></label>
              <label class="check-item"><input type="radio" name="budget" value="1000만원 이상" onchange="checkForm()"><span>1000만원 이상</span></label>
              <label class="check-item"><input type="radio" name="budget" value="기타" onchange="checkForm()"><span>기타</span></label>
            </div>
          </div>

          <div class="form-group">
            <label for="schedule">프로젝트 일정 <span class="required">*</span></label>
            <input type="text" id="schedule" placeholder="예: 2026년 5월 완료 목표" oninput="checkForm()">
          </div>

          <div class="form-group">
            <label for="message">프로젝트 내용 <span class="required">*</span></label>
            <textarea id="message" rows="6" placeholder="프로젝트 개요, 방향성 등을 자유롭게 작성해 주세요." oninput="checkForm()"></textarea>
          </div>

          <div class="form-group">
            <label for="attachment">참고자료 첨부</label>
            <input type="file" id="attachment" onchange="checkForm()">
          </div>

          <button class="submit-btn" id="submitBtn" disabled onclick="sendEmail()">
            <span id="btnText">문의 보내기</span>
          </button>
        </div>

        <div id="successMsg" class="success-msg" style="display:none;">
          <div class="success-icon">✓</div>
          <h3>문의가 접수되었습니다</h3>
          <p>빠른 시일 내에 연락드리겠습니다. 감사합니다.</p>
          <button onclick="resetForm()">새 문의하기</button>
        </div>
      </section>
    </div>
  </main>
</div>

<!-- ─── Mouse Trail Canvas ─── -->

<script>
  // Netlify Identity - admin 리디렉션
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/work/admin/";
        });

// ───────────────────────────────────────────────
// SPA Navigation
// ───────────────────────────────────────────────
function switchView(viewId) {
  document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  window.scrollTo(0, 0);

  if (viewId === 'index') {
    allProjects = getProjects();
    resetFilters();
  }
}

// INDEX JS
// ───────────────────────────────────────────────

let allProjects = getProjects();
let currentSelectedCategory = '';

function renderGallery(projects) {
  const grid = document.getElementById('galleryGrid');
  const noResults = document.getElementById('noResults');
  if (!projects.length) { grid.innerHTML=''; noResults.style.display='flex'; return; }
  noResults.style.display = 'none';
  grid.innerHTML = projects.map(p => {
    const cats = Array.isArray(p.category) ? p.category : [p.category];
    const catTags = cats.map(c => `<span class="cat-badge" data-category="${c}">${c}</span>`).join('');
    return `
    <div class="gallery-item" onclick="openDetail(${p.id})">
      <div class="gallery-thumb">
        <img src="${p.thumbnail}" alt="${p.title}" loading="lazy">
      </div>
      <div class="gallery-label">
        <span class="gallery-title-text">${p.title}</span>
        <div class="gallery-cat-tags">${catTags}</div>
      </div>
    </div>
    `;
  }).join('');
}

function setCategory(cat, btnElement) {
  currentSelectedCategory = cat;
  document.querySelectorAll('.cat-filter-btn').forEach(btn => btn.classList.remove('active'));
  if (btnElement) btnElement.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const year = document.getElementById('filterYear').value;
  const cat  = currentSelectedCategory;
  let f = allProjects;
  if (year) f = f.filter(p => p.year === year);
  if (cat)  f = f.filter(p => Array.isArray(p.category) ? p.category.includes(cat) : p.category === cat);
  renderGallery(f);
}

function resetFilters() {
  document.getElementById('filterYear').value = '';
  setCategory('');
}

function isMobile() { return window.innerWidth <= 768; }

function buildDetailHTML(p) {
  const texts = p.content.filter(b => b.type === 'text').map(b => `<p class="detail-text">${b.value}</p>`).join('');
  const images = p.content.filter(b => b.type === 'image').map(b =>
    `<figure class="detail-figure"><img src="${b.value}" alt="${b.caption||''}"></figure>`
  ).join('');

  const yearOnly = p.date.substring(0, 4);
  const cats = Array.isArray(p.category) ? p.category : [p.category];
  const catTags = cats.map(c => `<span class="cat-badge" data-category="${c}">${c}</span>`).join('');

  return `
    <div class="detail-header">
      <h1>${p.title}</h1>
      <div class="detail-meta">
        <span class="detail-date">${yearOnly}</span>
        <div style="display: flex; gap: 6px; flex-wrap: wrap;">${catTags}</div>
      </div>
    </div>
    <div class="detail-body">
      ${texts ? `<div class="detail-texts">${texts}</div>` : ''}
      <div class="detail-images">${images}</div>
    </div>
  `;
}

function openDetail(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('detailContent').innerHTML = buildDetailHTML(p);
  switchView('detail');
}

function closeDetail() {
  switchView('index');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('view-detail').classList.contains('active')) {
    closeDetail();
  }
});

renderGallery(allProjects);

// ───────────────────────────────────────────────
// CONTACT JS
// ───────────────────────────────────────────────
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
emailjs.init(EMAILJS_PUBLIC_KEY);

function formatPhone(input) {
  let val = input.value.replace(/\D/g, '');
  if (val.length > 11) val = val.slice(0, 11);
  if (val.length <= 3) input.value = val;
  else if (val.length <= 7) input.value = val.slice(0,3) + '-' + val.slice(3);
  else input.value = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7);
  checkForm();
}

function isEmailValid(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

function validateEmail() {
  const emailEl = document.getElementById('email');
  const errEl   = document.getElementById('emailError');
  const v = emailEl.value.trim();
  if (v && !isEmailValid(v)) {
    errEl.classList.add('visible');
    emailEl.classList.add('input-error');
  } else {
    errEl.classList.remove('visible');
    emailEl.classList.remove('input-error');
  }
  checkForm();
}

function getCheckedCategories() {
  return [...document.querySelectorAll('#catGrid input:checked')].map(el => el.value);
}

function checkForm() {
  const name     = document.getElementById('name').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const email    = document.getElementById('email').value.trim();
  const message  = document.getElementById('message').value.trim();
  const schedule = document.getElementById('schedule').value.trim();
  const cats     = getCheckedCategories();
  const detailCat = document.querySelector('input[name="detail_category"]:checked');
  const budget    = document.querySelector('input[name="budget"]:checked');
  document.getElementById('submitBtn').disabled = !(name && phone.length>=12 && isEmailValid(email) && cats.length && detailCat && budget && schedule && message);
}

function sendEmail() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('btnText').textContent = '전송 중...';
  const detailCat = document.querySelector('input[name="detail_category"]:checked').value;
  const budget    = document.querySelector('input[name="budget"]:checked').value;
  const schedule  = document.getElementById('schedule').value;
  const attachment = document.getElementById('attachment').files[0];
  const attachName = attachment ? attachment.name : '첨부파일 없음';

  const params = {
    from_name:       document.getElementById('name').value,
    phone:           document.getElementById('phone').value,
    email:           document.getElementById('email').value,
    category:        getCheckedCategories().join(', '),
    detail_category: detailCat,
    budget:          budget,
    schedule:        schedule,
    attachment_name: attachName,
    message:         document.getElementById('message').value
  };

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
    .then(() => {
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    })
    .catch(err => {
      alert('전송 중 오류가 발생했습니다.');
      console.error(err);
      document.getElementById('btnText').textContent = '문의 보내기';
      checkForm();
    });
}

function resetForm() {
  ['name','phone','email','schedule','message','attachment'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.querySelectorAll('.checkbox-grid input').forEach(el => el.checked = false);
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('btnText').textContent = '문의 보내기';
  document.getElementById('emailError').classList.remove('visible');
  document.getElementById('email').classList.remove('input-error');
}

// ───────────────────────────────────────────────
// MOUSE TRAIL EFFECT (PC Only, 0.2초 유지, 부드러운 곡선)
// ───────────────────────────────────────────────
const trailCanvas = document.getElementById('mouseTrailCanvas');
const ctx = trailCanvas.getContext('2d');
let points = [];
const TRAIL_LIFETIME = 200;

function resizeTrailCanvas() {
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeTrailCanvas);
resizeTrailCanvas();

window.addEventListener('mousemove', (e) => {
  if (window.innerWidth <= 768) return;
  points.push({ x: e.clientX, y: e.clientY, time: Date.now() });
});

function animateTrail() {
  requestAnimationFrame(animateTrail);
  ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  if (window.innerWidth <= 768) return;

  const currentTime = Date.now();
  points = points.filter(p => currentTime - p.time < TRAIL_LIFETIME);
  if (points.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length - 1; i++) {
    const xc = (points[i].x + points[i + 1].x) / 2;
    const yc = (points[i].y + points[i + 1].y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
  }

  ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

animateTrail();
</script>
</body>
</html>
